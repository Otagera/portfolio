name: Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_USERNAME: ${{ secrets.LASTFM_USERNAME }}

      - name: Prune to production dependencies
        run: npm prune --omit=dev

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: |
            dist
            node_modules
            package.json
            package-lock.json
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build
          path: build

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync build to server
        run: |
          rsync -avz --delete \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='portfolio.db*' \
            --exclude='.git' \
            build/ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/portfolio/"

      - name: Reload app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          timeout: 30s
          command_timeout: 2m
          script: |
            set -e
            source ~/.nvm/nvm.sh
            nvm use 24
            pm2 reload portfolio
            sleep 3
            pm2 describe portfolio | grep -q "status.*online" || { echo "portfolio process is not online after reload"; pm2 logs portfolio --lines 50 --nostream; exit 1; }
