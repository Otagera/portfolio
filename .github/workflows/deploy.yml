name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ~/portfolio
            for i in 1 2 3; do
              git fetch origin main && break
              echo "git fetch failed (attempt $i/3), retrying in 5s..."
              sleep 5
              if [ "$i" = 3 ]; then
                echo "git fetch failed after 3 attempts"
                exit 1
              fi
            done
            git reset --hard origin/main
            source ~/.nvm/nvm.sh
            nvm use 24
            npm ci
            npm run build
            pm2 reload portfolio
            sleep 3
            pm2 describe portfolio | grep -q "status.*online" || { echo "portfolio process is not online after reload"; pm2 logs portfolio --lines 50 --nostream; exit 1; }
